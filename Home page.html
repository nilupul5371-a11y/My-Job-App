<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAESTRO QUICINE - Management System</title>
    <!-- Icons සඳහා Font Awesome ලින්ක් එක -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1a1a1a;
            --accent-color: #e67e22;
            --accent-hover: #d35400;
            --bg-color: #f4f6f9;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Professional Header Style */
        header {
            background-color: var(--primary-color);
            color: #ffffff;
            text-align: center;
            padding: 25px 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            border-bottom: 4px solid var(--accent-color);
        }

        header h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 2px;
            font-weight: 700;
            text-transform: uppercase;
        }

        header h1 span {
            color: var(--accent-color);
        }

        header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #bbb;
            letter-spacing: 1px;
        }

        /* Main Container */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
        }

        .menu-box {
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        .menu-box h2 {
            color: var(--text-dark);
            font-size: 20px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        /* Buttons Layout */
        .button-grid {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .dashboard-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Pending Jobs Button Style */
        .btn-pending {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border-bottom: 5px solid #1a252f;
        }

        .btn-pending:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(44, 62, 80, 0.3);
            background: linear-gradient(135deg, #34495e, #2c3e50);
        }

        /* Spare Parts Button Style */
        .btn-parts {
            background: linear-gradient(135deg, var(--accent-color), #f39c12);
            border-bottom: 5px solid var(--accent-hover);
        }

        .btn-parts:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(230, 126, 34, 0.3);
            background: linear-gradient(135deg, #f39c12, var(--accent-color));
        }

        /* Button Icons */
        .dashboard-btn i {
            font-size: 32px;
            margin-bottom: 12px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 15px;
            font-size: 13px;
            color: #7f8c8d;
            background-color: #ffffff;
            border-top: 1px solid #e2e8f0;
        }

        /* Responsive Settings for Mobile Phones */
        @media (max-width: 550px) {
            header h1 { font-size: 20px; }
            header p { font-size: 12px; }
            
            .button-grid {
                flex-direction: column;
            }
            
            .dashboard-btn {
                padding: 20px;
                flex-direction: row;
                justify-content: flex-start;
                font-size: 16px;
            }
            
            .dashboard-btn i {
                margin-bottom: 0;
                margin-right: 15px;
                font-size: 24px;
            }
            
            .menu-box {
                padding: 25px 20px;
            }
        }
    </style>
</head>
<body>

    <!-- Professional Header -->
    <header>
        <h1>MAESTRO QUICINE - <span>KITCHEN EQUIPMENT</span></h1>
        <p>Internal Management Dashboard</p>
    </header>

    <!-- Main Content Area -->
    <div class="main-container">
        <div class="menu-box">
            <h2>Select Operations Department</h2>
            
            <div class="button-grid">
                <!-- Pending Jobs Button -->
                <a href="admin.html" class="dashboard-btn btn-pending">
                    <i class="fa-solid fa-clock-history"></i>
                    Pending Jobs
                </a>
                
                <!-- Spare Parts Button -->
                <a href="parts.html" class="dashboard-btn btn-parts">
                    <i class="fa-solid fa-gears"></i>
                    Spare Parts
                </a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        &copy; 2026 MAESTRO CUISINE. All Rights Reserved.
    </footer>

</body>
</html>
