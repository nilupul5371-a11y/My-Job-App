<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Firebase Fix</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <div style="text-align: center; margin-top: 50px;">
        <h2>Firebase Notification</h2>
        <button id="btn" style="padding: 15px; background: orange; border: none; border-radius: 5px;">Send Notification</button>
        <p id="msg">පරීක්ෂා කරමින්...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCllM0e1x-6TCt17MZ3gIrij1qAkuU7nL4",
            authDomain: "my-job-app-52bf2.firebaseapp.com",
            projectId: "my-job-app-52bf2",
            storageBucket: "my-job-app-52bf2.firebasestorage.app",
            messagingSenderId: "269752262423",
            appId: "1:269752262423:web:ff5c167ff9a95ee89ae152"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        // Service Worker Register කිරීම
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('https://nilupul5371-a11y.github.io/firebase-messaging-sw.js')

            .then((reg) => {
                console.log("SW Registered");
                // අවසර ඉල්ලීම
                return getToken(messaging, { 
                    vapidKey: "BNhoY2z1ewBBf85GLpr-3KPCGtN4oN73iBfHfByMa-Qf-nCTbxvNyb058k15ck5CqvHz433YNPBvzt9ZDM2iEB8" 
                });
            }).then((token) => {
                if(token) document.getElementById('msg').innerText = "සාර්ථකයි! Token එක ලැබුණා.";
            }).catch((err) => {
                document.getElementById('msg').innerText = "දෝෂය: " + err.message;
            });
        }

        document.getElementById('btn').onclick = () => {
            new Notification("වැඩ කරනවා!", { body: "දැන් Notification එක එනවා නේද?" });
        };
    </script>
</body>
</html>
