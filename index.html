<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Spare Parts List</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f4f4f9;
        }
        .wrapper {
            max-width: 100%; /* සම්පූර්ණ Screen එකම පෙනීමට */
            margin: 0 auto;
            position: relative;
            padding-bottom: 80px; /* බටන් එකට වැහෙන්නේ නැති වෙන්න */
        }
        h3 {
            color: #333;
            margin-top: 10px;
        }
        /* Back Button Style */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #34495e;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-back:hover {
            background-color: #2c3e50;
        }

        /* Floating Add Button (+) */
        .fab-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #28a745;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background-color 0.2s;
            z-index: 1000;
        }
        .fab-btn:hover {
            background-color: #218838;
            transform: scale(1.05);
        }

        /* Popup Modal (Form) Background */
        .modal {
            display: none; /* මුලින්ම පේන්නේ නැහැ */
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5); /* අඳුරු පසුබිම */
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        /* Popup Box Style */
        .modal-content {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.25);
            position: relative;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .modal-header h2 {
            margin: 0;
            font-size: 20px;
            color: #333;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #aaa;
            width: auto;
            padding: 0;
        }
        .close-btn:hover { color: #333; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr; /* Popup එකේදී එක යට එක */
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        .form-group input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .submit-btn {
            background-color: #28a745;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
        }
        .submit-btn:hover { background-color: #218838; }

        /* Full Screen Responsive Table Style */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }
        th { background-color: #007bff; color: white; }
        tr:hover { background-color: #f9f9f9; }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            width: auto;
        }
        .btn-delete:hover { background-color: #c82333; }
    </style>
</head>
<body>

    <div class="wrapper">
        <a href="home.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>

        <h3>Spare Parts List</h3>
        
        <div class="table-responsive">
            <table id="partsTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Location</th>
                        <th>Item</th>
                        <th>Quantity</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <button class="fab-btn" id="openModalBtn"><i class="fa-solid fa-plus"></i></button>

    <div class="modal" id="formModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Spare Part</h2>
                <button class="close-btn" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="partsForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="date">Date:</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="location">Location:</label>
                        <input type="text" id="location" placeholder="e.g., Shelf A" required>
                    </div>
                    <div class="form-group">
                        <label for="item">Item Name:</label>
                        <input type="text" id="item" placeholder="e.g., Oil Filter" required>
                    </div>
                    <div class="form-group">
                        <label for="quantity">Quantity:</label>
                        <input type="number" id="quantity" min="1" placeholder="e.g., 5" required>
                    </div>
                </div>
                <button type="button" class="submit-btn" id="addBtn">Save Part</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ඔයා ලබාදුන් Firebase Configuration එක
        const firebaseConfig = {
          apiKey: "AIzaSyCllM0e1x-6TCt17MZ3gIrij1qAkuU7nL4",
          authDomain: "my-job-app-52bf2.firebaseapp.com",
          projectId: "my-job-app-52bf2",
          storageBucket: "my-job-app-52bf2.firebasestorage.app",
          messagingSenderId: "269752262423",
          appId: "1:269752262423:web:ff5c167ff9a95ee89ae152",
          measurementId: "G-ZHXT8NS3MB"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);

        const partsCollection = collection(db, "spare_parts");

        // Modal Controls (Popup එක Open/Close කරන කොටස)
        const modal = document.getElementById('formModal');
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');

        openModalBtn.addEventListener('click', () => { modal.style.display = 'flex'; });
        closeModalBtn.addEventListener('click', () => { modal.style.display = 'none'; });
        
        // Popup එකෙන් පිටත ක්ලික් කරොත් වැහෙන එක
        window.addEventListener('click', (e) => { if(e.target == modal) { modal.style.display = 'none'; } });

        // Add Button Event
        document.getElementById('addBtn').addEventListener('click', addPart);

        // 1. DATA SAVE
        async function addPart() {
            var date = document.getElementById('date').value;
            var location = document.getElementById('location').value;
            var item = document.getElementById('item').value;
            var quantity = document.getElementById('quantity').value;

            if(date == "" || location == "" || item == "" || quantity == "") {
                alert("කරුණාකර සියලුම විස්තර ඇතුළත් කරන්න!");
                return;
            }

            try {
                await addDoc(partsCollection, {
                    date: date,
                    location: location,
                    item: item,
                    quantity: Number(quantity)
                });

                document.getElementById('partsForm').reset();
                modal.style.display = 'none'; // Save වුනාම Popup එක වහන්න
            } catch (error) {
                console.error("Error adding document: ", error);
                alert("දත්ත ඇතුළත් කිරීමේදී දෝෂයක් සිදුවිය!");
            }
        }

        // 2. DATA READ (Real-time)
        onSnapshot(partsCollection, (snapshot) => {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = "";

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;

                var newRow = tableBody.insertRow();
                newRow.insertCell(0).innerHTML = data.date;
                newRow.insertCell(1).innerHTML = data.location;
                newRow.insertCell(2).innerHTML = data.item;
                newRow.insertCell(3).innerHTML = data.quantity;
                
                var actionCell = newRow.insertCell(4);
                actionCell.innerHTML = `<button class="btn-delete" data-id="${id}"><i class="fa-solid fa-trash"></i> Delete</button>`;
            });

            const deleteButtons = document.querySelectorAll('.btn-delete');
            deleteButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const docId = this.getAttribute('data-id');
                    deletePart(docId);
                });
            });
        });

        // 3. DATA DELETE
        async function deletePart(id) {
            if(confirm("මෙම දත්තය ස්ථිරවම මකා දැමීමට අවශ්‍යද?")) {
                try {
                    await deleteDoc(doc(db, "spare_parts", id));
                } catch (error) {
                    console.error("Error removing document: ", error);
                    alert("මකා දැමීමට නොහැකි විය!");
                }
            }
        }
    </script>
</body>
</html>
