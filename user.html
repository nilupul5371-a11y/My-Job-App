<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Panel</title>
    <link rel="manifest" href="manifest-user.json">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.7); --border: rgba(255, 255, 255, 0.3); }
        body { font-family: 'Segoe UI', sans-serif; background: #e0eafc; margin: 0; padding: 20px; }
        .job-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .job-desc-text { word-wrap: break-word; overflow-wrap: break-word; word-break: break-all; flex: 1; margin-right: 10px; }
        .status-badge { font-size: 10px; padding: 4px 8px; border-radius: 5px; font-weight: bold; text-transform: uppercase; margin-right: 8px; white-space: nowrap; }
        .pending { background: #fff3cd; color: #856404; }
        .scheduled { background: #d1ecf1; color: #0c5460; }
        .timer-tag { font-size: 11px; font-weight: bold; color: #007bff; white-space: nowrap; flex-shrink: 0; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; padding: 10px;}
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
        input, textarea { width: 100%; border-radius: 8px; padding: 12px; margin: 8px 0; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .comp-btn { flex: 2; background: #28a745; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;}
        .shed-btn { flex: 1; background: #007bff; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer;}
    </style>
</head>
<body>

    <h2>My Job List</h2>
    <div id="userJobList"></div>

    <div class="modal" id="jobModal">
        <div class="modal-content">
            <h3 id="modalTitle">Complete / Schedule Job</h3>
            
            <div id="schedDisplay" style="display:none; margin-bottom:15px; padding:10px; background:#f0f8ff; border-radius:8px; border-left:4px solid #007bff;">
                <b>Already Scheduled for:</b> <span id="schedVal"></span>
            </div>

            <form id="mainForm">
                <input type="hidden" id="activeJobId">
                <input type="text" id="loc" placeholder="1. Location" required>
                <input type="text" id="item" placeholder="2. Item Code" required>
                <input type="text" id="brand" placeholder="3. Brand" required>
                <input type="text" id="model" placeholder="4. Model" required>
                <input type="text" id="sn" placeholder="5. S/N" required>
                <textarea id="fDesc" placeholder="6. Description" rows="3" required></textarea>
                <input type="text" id="tech" placeholder="7. Technician" required>
                
                <div id="scheduleInputArea" style="display:none; margin-top:10px; background:#f9f9f9; padding:10px; border-radius:8px;">
                    <label>Pick Schedule Date & Time:</label>
                    <input type="datetime-local" id="customDate">
                </div>

                <div class="btn-group">
                    <button type="button" class="comp-btn" onclick="submitJob('completed')">Complete Now</button>
                    <button type="button" class="shed-btn" id="shedActionBtn" onclick="toggleScheduleMode()">Schedule</button>
                </div>
            </form>

            <p onclick="closeModal()" style="text-align:center; color:red; cursor:pointer; margin-top:15px;">Cancel</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCllM0e1x-6TCt17MZ3gIrij1qAkuU7nL4",
            authDomain: "my-job-app-52bf2.firebaseapp.com",
            projectId: "my-job-app-52bf2",
            appId: "1:269752262423:web:ff5c167ff9a95ee89ae152"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Service Worker & Background Notifications
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function triggerUserNotification(title, message) {
            if (Notification.permission === 'granted') {
                navigator.serviceWorker.ready.then(reg => {
                    reg.showNotification(title, { 
                        body: message, 
                        icon: 'https://cdn-icons-png.flaticon.com/512/1157/1157000.png',
                        vibrate: [200, 100, 200]
                    });
                });
            } else {
                Notification.requestPermission();
            }
        }

        onSnapshot(collection(db, "jobs"), (snap) => {
            snap.docChanges().forEach(change => {
                if (change.type === "added") {
                    const data = change.doc.data();
                    if (data.createdAt > Date.now() - 5000) {
                        triggerUserNotification("New Job Assigned!", data.description);
                    }
                }
            });
        });

        function getTimer(ts) {
            if(!ts) return "";
            const diff = Math.floor((Date.now() - ts) / 1000);
            if (diff < 60) return diff + "s";
            const mins = Math.floor(diff / 60);
            if (mins < 60) return mins + "m";
            const hours = Math.floor(mins / 60);
            if (hours < 24) return hours + "h";
            const days = Math.floor(hours / 24);
            if (days < 7) return days + "d";
            const weeks = Math.floor(days / 7);
            if (weeks < 4) return weeks + "w";
            const months = Math.floor(days / 30);
            return months + "M";
        }

        onSnapshot(collection(db, "jobs"), (snap) => {
            const list = document.getElementById('userJobList');
            list.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                if(data.status !== "completed") {
                    const card = document.createElement('div');
                    card.className = 'job-card';
                    card.onclick = () => openJobModal(d.id, data);
                    const timer = data.status === 'pending' ? `<span class="timer-tag" data-ts="${data.createdAt}">${getTimer(data.createdAt)}</span>` : '';
                    card.innerHTML = `<span class="job-desc-text">${data.description}</span><div style="display:flex; align-items:center;"><span class="status-badge ${data.status}">${data.status}</span>${timer}</div>`;
                    list.appendChild(card);
                }
            });
        });

        window.openJobModal = (id, data) => {
            document.getElementById('activeJobId').value = id;
            document.getElementById('jobModal').style.display = 'flex';
            document.getElementById('scheduleInputArea').style.display = 'none';
            document.getElementById('shedActionBtn').innerText = "Schedule";
            
            if(data.details) {
                document.getElementById('loc').value = data.details.location || '';
                document.getElementById('item').value = data.details.itemCode || '';
                document.getElementById('brand').value = data.details.brand || '';
                document.getElementById('model').value = data.details.model || '';
                document.getElementById('sn').value = data.details.sn || '';
                document.getElementById('fDesc').value = data.details.description || '';
                document.getElementById('tech').value = data.details.technician || '';
            } else {
                document.getElementById('mainForm').reset();
            }

            const display = document.getElementById('schedDisplay');
            if(data.status === 'scheduled') {
                display.style.display = 'block';
                document.getElementById('schedVal').innerText = data.scheduledDate;
            } else {
                display.style.display = 'none';
            }
        };

        window.toggleScheduleMode = () => {
            const area = document.getElementById('scheduleInputArea');
            if(area.style.display === 'none') {
                area.style.display = 'block';
                document.getElementById('shedActionBtn').innerText = "Confirm Schedule";
            } else {
                submitJob('scheduled');
            }
        };

        window.submitJob = async (status) => {
            const id = document.getElementById('activeJobId').value;
            const updateData = {
                status: status,
                details: {
                    location: document.getElementById('loc').value,
                    itemCode: document.getElementById('item').value,
                    brand: document.getElementById('brand').value,
                    model: document.getElementById('model').value,
                    sn: document.getElementById('sn').value,
                    description: document.getElementById('fDesc').value,
                    technician: document.getElementById('tech').value
                }
            };

            if(status === 'scheduled') {
                const date = document.getElementById('customDate').value;
                if(!date) return alert("Please select a date first!");
                updateData.scheduledDate = date.replace('T', ' ');
            }

            await updateDoc(doc(db, "jobs", id), updateData);
            closeModal();
        };

        window.closeModal = () => document.getElementById('jobModal').style.display = 'none';
        setInterval(() => { document.querySelectorAll('.timer-tag').forEach(el => { el.innerText = getTimer(parseInt(el.dataset.ts)); }); }, 1000);
    </script>
</body>
</html>
