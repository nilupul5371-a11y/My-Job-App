<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Filter Service & Replacement Record</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            background-color: #f4f4f9;
        }
        .wrapper {
            max-width: 100%;
            margin: 0 auto;
            position: relative;
            padding-bottom: 80px;
        }
        h3 {
            color: #333;
            margin-top: 10px;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #34495e;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }
        .btn-back:hover { background-color: #2c3e50; }

        .fab-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #e67e22;
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background-color 0.2s;
            z-index: 1000;
        }
        .fab-btn:hover {
            background-color: #d35400;
            transform: scale(1.05);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-content {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.25);
            position: relative;
            animation: fadeIn 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes fadeIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .modal-header h2 { margin: 0; font-size: 20px; color: #333; }
        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #aaa;
            width: auto;
            padding: 0;
        }
        .close-btn:hover { color: #333; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        @media (max-width: 500px) {
            .form-grid { grid-template-columns: 1fr; }
        }
        .form-group { display: flex; flex-direction: column; }
        .form-group-full {
            grid-column: span 2;
            display: flex;
            flex-direction: column;
        }
        @media (max-width: 500px) { .form-group-full { grid-column: span 1; } }
        .form-group label, .form-group-full label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }
        .form-group input, .form-group select, .form-group-full textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }
        .submit-btn {
            background-color: #28a745;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            font-weight: bold;
        }
        .submit-btn:hover { background-color: #218838; }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            background-color: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 950px;
        }
        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
            font-size: 14px;
        }
        th { background-color: #2c3e50; color: white; }
        tr:hover { background-color: #f9f9f9; }

        /* Overdue සර්විස් සඳහා පේළිය රතු පැහැ ගැන්වීම */
        tr.service-overdue {
            background-color: #fce8e6 !important;
            color: #c53929;
            font-weight: 500;
        }
        tr.service-overdue td {
            border-bottom: 1px solid #f7c5c0;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
        }
        .btn-edit {
            background-color: #ffc107;
            color: #212529;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-edit:hover { background-color: #e0a800; }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            width: auto;
        }
        .btn-delete:hover { background-color: #c82333; }
    </style>
</head>
<body>

    <div class="wrapper">
        <a href="Home.html" class="btn-back"><i class="fa-solid fa-arrow-left"></i> Back </a>
        <h3>Water Filter Service & Replacement Records</h3>
        
        <div class="table-responsive">
            <table id="recordsTable">
                <thead>
                    <tr>
                        <th>BOQ REF.</th>
                        <th>Equipment Name</th>
                        <th>Equipment No.</th>
                        <th>Location</th>
                        <th>Date of Service</th>
                        <th>Next Service Date</th>
                        <th>Remark</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <button class="fab-btn" id="openModalBtn"><i class="fa-solid fa-plus"></i></button>

    <div class="modal" id="formModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add Service Record</h2>
                <button class="close-btn" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="recordForm">
                <input type="hidden" id="editDocId">
                
                <div class="form-grid">
                    <div class="form-group">
                        <label for="boqRef">BOQ REF.:</label>
                        <input type="text" id="boqRef" placeholder="e.g., BOQ-001" required>
                    </div>
                    <div class="form-group">
                        <label for="equipName">Equipment Name:</label>
                        <select id="equipName" required>
                            <option value="" disabled selected>-- Select Equipment --</option>
                            <option value="Water Boiler">Water Boiler</option>
                            <option value="Coffee Machine">Coffee Machine</option>
                            <option value="CNTR-REST- ENT">CNTR-REST- ENT</option>
                            <option value="CENTR- BAR">CENTR- BAR</option>
                            <option value="CNTR-CAFE & BAR">CNTR-CAFE & BAR</option>
                            <option value="ICE CUBE MACHINE">ICE CUBE MACHINE</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="location">Location:</label>
                        <input type="text" id="location" placeholder="e.g., Main Kitchen" required>
                    </div>
                    <div class="form-group">
                        <label for="equipNo">Equipment No:</label>
                        <input type="text" id="equipNo" placeholder="e.g., EQ-1024" required>
                    </div>
                    <div class="form-group">
                        <label for="serviceDate">Date of Service:</label>
                        <input type="date" id="serviceDate" required>
                    </div>
                    <div class="form-group">
                        <label for="nextServiceDate">Next Service Date:</label>
                        <input type="date" id="nextServiceDate" required>
                    </div>
                    <div class="form-group-full">
                        <label for="remark">Remark:</label>
                        <textarea id="remark" rows="3" placeholder="Enter notes here..."></textarea>
                    </div>
                </div>
                <button type="button" class="submit-btn" id="saveBtn">Save Record</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCllM0e1x-6TCt17MZ3gIrij1qAkuU7nL4",
          authDomain: "my-job-app-52bf2.firebaseapp.com",
          projectId: "my-job-app-52bf2",
          storageBucket: "my-job-app-52bf2.firebasestorage.app",
          messagingSenderId: "269752262423",
          appId: "1:269752262423:web:ff5c167ff9a95ee89ae152",
          measurementId: "G-ZHXT8NS3MB"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);
        const recordsCollection = collection(db, "filter_records");

        const modal = document.getElementById('formModal');
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const saveBtn = document.getElementById('saveBtn');
        const modalTitle = document.getElementById('modalTitle');

        // Notification Permission ලබා ගැනීම
        if (Notification.permission !== "granted" && Notification.permission !== "denied") {
            Notification.requestPermission();
        }

        openModalBtn.addEventListener('click', () => { 
            document.getElementById('recordForm').reset();
            document.getElementById('editDocId').value = "";
            modalTitle.innerText = "Add Service Record";
            saveBtn.innerText = "Save Record";
            modal.style.display = 'flex'; 
        });
        
        closeModalBtn.addEventListener('click', () => { modal.style.display = 'none'; });
        window.addEventListener('click', (e) => { if(e.target == modal) { modal.style.display = 'none'; } });

        saveBtn.addEventListener('click', saveRecord);

        // 1. DATA SAVE & UPDATE FUNCTION
        async function saveRecord() {
            var editId = document.getElementById('editDocId').value;
            var boqRef = document.getElementById('boqRef').value;
            var equipName = document.getElementById('equipName').value;
            var equipNo = document.getElementById('equipNo').value;
            var location = document.getElementById('location').value;
            var serviceDate = document.getElementById('serviceDate').value;
            var nextServiceDate = document.getElementById('nextServiceDate').value;
            var remark = document.getElementById('remark').value;

            if(boqRef == "" || equipName == "" || equipNo == "" || location == "" || serviceDate == "" || nextServiceDate == "") {
                alert("කරුණාකර සියලුම අත්‍යවශ්‍ය විස්තර ඇතුළත් කරන්න!");
                return;
            }

            const recordData = {
                boqRef: boqRef,
                equipName: equipName,
                equipNo: equipNo,
                location: location,
                serviceDate: serviceDate,
                nextServiceDate: nextServiceDate,
                remark: remark
            };

            try {
                if(editId === "") {
                    await addDoc(recordsCollection, recordData);
                } else {
                    await updateDoc(doc(db, "filter_records", editId), recordData);
                }
                document.getElementById('recordForm').reset();
                modal.style.display = 'none'; 
            } catch (error) {
                console.error("Error saving document: ", error);
                alert("දත්ත සුරැකීමේදී දෝෂයක් සිදුවිය: " + error.message);
            }
        }

        // 2. DATA READ & NOTIFICATION TRIGGER
        onSnapshot(recordsCollection, (snapshot) => {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = "";
            
            let overdueCount = 0;
            const today = new Date();
            today.setHours(0,0,0,0);

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;

                var newRow = tableBody.insertRow();
                
                if (data.nextServiceDate) {
                    const nextDate = new Date(data.nextServiceDate);
                    nextDate.setHours(0,0,0,0);
                    
                    if (nextDate <= today) {
                        newRow.classList.add('service-overdue');
                        overdueCount++;
                    }
                }

                newRow.insertCell(0).innerHTML = data.boqRef || "";
                newRow.insertCell(1).innerHTML = data.equipName || "";
                newRow.insertCell(2).innerHTML = data.equipNo || "";
                newRow.insertCell(3).innerHTML = data.location || "";
                newRow.insertCell(4).innerHTML = data.serviceDate || "";
                newRow.insertCell(5).innerHTML = data.nextServiceDate || "";
                newRow.insertCell(6).innerHTML = data.remark || "-";
                
                var actionCell = newRow.insertCell(7);
                actionCell.innerHTML = `
                    <div class="action-buttons">
                        <button class="btn-edit" data-id="${id}" data-boq="${data.boqRef || ''}" data-name="${data.equipName || ''}" data-no="${data.equipNo || ''}" data-loc="${data.location || ''}" data-sdate="${data.serviceDate || ''}" data-ndate="${data.nextServiceDate || ''}" data-rem="${data.remark || ''}"><i class="fa-solid fa-pen-to-square"></i> Edit</button>
                        <button class="btn-delete" data-id="${id}"><i class="fa-solid fa-trash"></i> Delete</button>
                    </div>
                `;
            });

            // සැබෑ Web Notification එකක් ක්‍රියාත්මක කිරීම
            if (overdueCount > 0 && Notification.permission === "granted") {
                new Notification("Water Filter Service Reminder", {
                    body: `සර්විස් කිරීමට කාලය පැමිණි උපකරණ ${overdueCount}ක් ඇත. කරුණාකර පරීක්ෂා කරන්න.`,
                    icon: "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/svgs/solid/faucet-drip.svg"
                });
            }

            // Edit Button Setup
            const editButtons = document.querySelectorAll('.btn-edit');
            editButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    document.getElementById('editDocId').value = this.getAttribute('data-id');
                    document.getElementById('boqRef').value = this.getAttribute('data-boq');
                    document.getElementById('equipName').value = this.getAttribute('data-name');
                    document.getElementById('equipNo').value = this.getAttribute('data-no');
                    document.getElementById('location').value = this.getAttribute('data-loc');
                    document.getElementById('serviceDate').value = this.getAttribute('data-sdate');
                    document.getElementById('nextServiceDate').value = this.getAttribute('data-ndate');
                    document.getElementById('remark').value = this.getAttribute('data-rem');

                    modalTitle.innerText = "Edit Service Record";
                    saveBtn.innerText = "Update Record";
                    modal.style.display = 'flex';
                });
            });

            // Delete Button Setup
            const deleteButtons = document.querySelectorAll('.btn-delete');
            deleteButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const docId = this.getAttribute('data-id');
                    deleteRecord(docId);
                });
            });
        });

        // 3. DATA DELETE
        async function deleteRecord(id) {
            if(confirm("මෙම වාර්තාව ස්ථිරවම මකා දැමීමට අවශ්‍යද?")) {
                try {
                    await deleteDoc(doc(db, "filter_records", id));
                } catch (error) {
                    console.error("Error removing document: ", error);
                    alert("මකා දැමීමට නොහැකි විය!");
                }
            }
        }
    </script>
</body>
</html>
